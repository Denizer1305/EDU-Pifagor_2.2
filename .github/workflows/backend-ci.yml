name: Backend CI

on:
  push:
    branches:
      - main
      - dev
      - dev-backend
      - dev-frontend
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - ".pre-commit-config.yaml"
      - ".editorconfig"
      - ".gitignore"

  pull_request:
    branches:
      - main
      - dev
      - dev-backend
      - dev-frontend
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - ".pre-commit-config.yaml"
      - ".editorconfig"
      - ".gitignore"
      - "docker-compose.dev.yml"
      - "docker-compose.yml"
      - "deploy/**"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pifagor_test
          POSTGRES_USER: pifagor
          POSTGRES_PASSWORD: pifagor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pifagor -d pifagor_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.testing
      DJANGO_SECRET_KEY: github-actions-test-secret-key
      SECRET_KEY: github-actions-test-secret-key

      DEBUG: "False"
      USE_POSTGRES_FOR_TESTS: "1"

      POSTGRES_DB: pifagor_test
      POSTGRES_USER: pifagor
      POSTGRES_PASSWORD: pifagor
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"

      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements/base.txt
            backend/requirements/dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements/dev.txt

      - name: Show versions
        run: |
          python --version
          python -m pip --version
          python -m django --version

      - name: Run backend checks
        run: make ci

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
        -   name: Checkout repository
            uses: actions/checkout@v6

        -   name: Build backend Docker image
            run: docker compose -f docker-compose.dev.yml build backend
