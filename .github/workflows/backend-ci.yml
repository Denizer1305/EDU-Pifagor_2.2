name: Backend CI

on:
  push:
    branches:
      - main
      - dev
      - dev-backend
  pull_request:
    branches:
      - main
      - dev
      - dev-backend

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pifagor_test
          POSTGRES_USER: pifagor
          POSTGRES_PASSWORD: pifagor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pifagor -d pifagor_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.testing
      SECRET_KEY: github-actions-test-secret-key
      DEBUG: "False"

      POSTGRES_DB: pifagor_test
      POSTGRES_USER: pifagor
      POSTGRES_PASSWORD: pifagor
      DB_HOST: localhost
      DB_PORT: "5432"

      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements/base.txt
            backend/requirements/dev.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements/dev.txt

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format . --check

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run --settings=config.settings.testing

      - name: Django system check
        run: python manage.py check --settings=config.settings.testing

      - name: Run tests
        run: python manage.py test --settings=config.settings.testing
