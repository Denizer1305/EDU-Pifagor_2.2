{% extends "emails/shared/base_email.html" %}
{% block content %}
<p style="margin:0 0 16px 0;font-size:16px;line-height:1.7;">Здравствуйте, {{ first_name|default:"пользователь" }}!</p>
<p style="margin:0 0 16px 0;font-size:16px;line-height:1.7;">Для вас опубликовано новое задание <b>{{ assignment_title }}</b>.</p>
<div style="padding:16px;border-radius:14px;background:#EEF1F6;margin:20px 0;">
  <div style="font-size:14px;line-height:1.8;color:#34495E;">
    <b>Курс:</b> {{ course_title }}<br/>
    <b>Тип:</b> {{ assignment_type }}<br/>
    <b>Дедлайн:</b> {{ deadline_at }}
  </div>
</div>
<table role="presentation" cellspacing="0" cellpadding="0" style="margin:24px 0;">
  <tr>
    <td style="border-radius:12px;background:#4A6FA5;">
      <a href="{{ assignment_url }}" style="display:inline-block;padding:14px 24px;color:#FFFFFF;text-decoration:none;font-size:15px;font-weight:700;">Открыть задание</a>
    </td>
  </tr>
</table>
{% endblock %}
